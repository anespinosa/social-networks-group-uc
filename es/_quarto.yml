project:
  type: website
  output-dir: ../_site/es

lang: es

website:
  title: "Grupo de Redes Sociales – UC"
  description: "Grupo de Redes Sociales – UC, Instituto de Sociología, Pontificia Universidad Católica de Chile."
  favicon: favicon.svg
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    background: dark
    left:
      - text: Inicio
        file: index.qmd
      - text: Equipo
        file: equipo.qmd
      - text: Investigación
        file: investigacion.qmd
      - text: Publicaciones
        file: publicaciones.qmd
      - text: Docencia
        file: docencia.qmd
      - text: Vinculación
        file: vinculacion.qmd
      - text: Futuros Estudiantes
        file: futuros-estudiantes.qmd
      - text: Contacto
        file: contacto.qmd
    right:
      - text: '<span class="lang-switch">EN</span>'
        href: ../en/index.html
  page-footer:
    left: "© 2026 Grupo de Redes Sociales – UC · Instituto de Sociología, Pontificia Universidad Católica de Chile"
    right:
      - text: "CHISOCNET"
        href: https://www.chisocnet.org
      - text: "netmem (CRAN)"
        href: https://cran.r-project.org/web/packages/netmem/index.html
      - text: "English"
        href: ../en/index.html

format:
  html:
    theme: [cosmo, ../shared/theme.scss]
    css: ../shared/extra.css
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
          <script src="hero-network.js"></script>
    toc: false
    grid:
      body-width: 900px
