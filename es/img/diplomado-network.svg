<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node { fill: #f2a93b; opacity: 0.9; }
      .node-secondary { fill: #4d8fd1; opacity: 0.7; }
      .edge { stroke: rgba(242, 169, 59, 0.3); stroke-width: 1.5; }
      .edge-active { stroke: rgba(242, 169, 59, 0.6); stroke-width: 2; }
      @keyframes pulse {
        0%, 100% { r: 5; opacity: 0.9; }
        50% { r: 6.5; opacity: 1; }
      }
      .node-pulse { animation: pulse 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Central hub -->
  <circle cx="100" cy="100" r="8" class="node node-pulse"/>

  <!-- Learning nodes arranged in circle -->
  <circle cx="100" cy="40" r="5" class="node"/>
  <circle cx="155" cy="60" r="5" class="node-secondary"/>
  <circle cx="165" cy="120" r="5" class="node"/>
  <circle cx="130" cy="160" r="5" class="node-secondary"/>
  <circle cx="70" cy="170" r="5" class="node"/>
  <circle cx="35" cy="145" r="5" class="node-secondary"/>
  <circle cx="25" cy="80" r="5" class="node"/>
  <circle cx="50" cy="45" r="5" class="node-secondary"/>

  <!-- Connections from center -->
  <line x1="100" y1="100" x2="100" y2="40" class="edge-active"/>
  <line x1="100" y1="100" x2="155" y2="60" class="edge"/>
  <line x1="100" y1="100" x2="165" y2="120" class="edge-active"/>
  <line x1="100" y1="100" x2="130" y2="160" class="edge"/>
  <line x1="100" y1="100" x2="70" y2="170" class="edge-active"/>
  <line x1="100" y1="100" x2="35" y2="145" class="edge"/>
  <line x1="100" y1="100" x2="25" y2="80" class="edge-active"/>
  <line x1="100" y1="100" x2="50" y2="45" class="edge"/>

  <!-- Secondary connections (learning paths) -->
  <line x1="100" y1="40" x2="155" y2="60" class="edge" opacity="0.2"/>
  <line x1="155" y1="60" x2="165" y2="120" class="edge" opacity="0.2"/>
  <line x1="165" y1="120" x2="130" y2="160" class="edge" opacity="0.2"/>
</svg>